<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Complaints — UniResolve Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="admin-dashboard.html" class="logo">
        <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.00008 6V9H5.00008V6H8.00008ZM3.00008 4V11H10.0001V4H3.00008ZM13.0001 4H21.0001V6H13.0001V4ZM13.0001 11H21.0001V13H13.0001V11ZM13.0001 18H21.0001V20H13.0001V18ZM10.7072 16.2071L9.29297 14.7929L6.00008 18.0858L4.20718 16.2929L2.79297 17.7071L6.00008 20.9142L10.7072 16.2071Z"></path></svg></span>
        UniResolve
      </a>
    </div>

    <div class="sidebar-label">Admin Panel</div>

    <nav>
      <a href="admin-dashboard.html" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="admin-complaints.html" class="nav-link active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        All Complaints
      </a>
    </nav>

    <div class="sidebar-footer">
      <div style="display:flex; align-items:center; gap:0.75rem; padding:0.875rem; background:rgba(255,255,255,0.06); border-radius:var(--radius-sm); margin-bottom:0.75rem;">
        <div style="width:34px; height:34px; border-radius:50%; background:#4f46e5; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <span style="font-family:'Google Sans',sans-serif; font-size:0.85rem; font-weight:700; color:#fff;">AD</span>
        </div>
        <div style="min-width:0;">
          <p style="font-size:0.875rem; font-weight:600; color:#fff;">Admin</p>
          <p style="font-size:0.75rem; color:rgba(255,255,255,0.45);">Administrator</p>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-outline" style="width:100%;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Out
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-text">
        <h1>Manage Complaints</h1>
        <p>Review, filter, and update the status of all submitted issues.</p>
      </div>
      <!-- Total count badge -->
      <div style="display:flex; align-items:center; gap:0.5rem; background:var(--primary-light); border:1px solid #bfdbfe; border-radius:var(--radius-sm); padding:0.5rem 1rem;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span style="font-size:0.85rem; font-weight:700; color:var(--primary);"><span id="total-count">0</span> Total</span>
      </div>
    </div>

    <!-- Table Card -->
    <div class="table-container">

      <!-- Toolbar -->
      <div class="table-header" style="flex-wrap:wrap; gap:0.875rem;">

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="filterComplaints('all', this)">
            All <span class="tab-count" id="count-all">0</span>
          </button>
          <button class="filter-tab" data-filter="pending" onclick="filterComplaints('pending', this)">
            Pending <span class="tab-count" id="count-pending">0</span>
          </button>
          <button class="filter-tab" data-filter="in_progress" onclick="filterComplaints('in_progress', this)">
            In Progress <span class="tab-count" id="count-in_progress">0</span>
          </button>
          <button class="filter-tab" data-filter="resolved" onclick="filterComplaints('resolved', this)">
            Resolved <span class="tab-count" id="count-resolved">0</span>
          </button>
        </div>

        <!-- Search + Category filter -->
        <div style="display:flex; gap:0.625rem; margin-left:auto;">

          <!-- Category dropdown filter -->
          <select id="category-filter" onchange="filterByCategory(this.value)"
            style="padding:0.45rem 0.75rem; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'Figtree',sans-serif; font-size:0.85rem; color:var(--text-body); background:var(--bg); cursor:pointer; transition:var(--transition);">
            <option value="all">All Categories</option>
            <option value="IT">IT &amp; Tech</option>
            <option value="Facilities">Facilities</option>

            <option value="Food">Food</option>
            <option value="Academic">Academics</option>
            <option value="Safety">Safety</option>
            <option value="Other">Other</option>
          </select>

          <!-- Search -->
          <div style="position:relative;">
            <svg style="position:absolute; left:0.75rem; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search by title or student..."
              oninput="searchComplaints(this.value)"
              style="padding:0.45rem 0.875rem 0.45rem 2.25rem; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'Figtree',sans-serif; font-size:0.85rem; color:var(--text-heading); background:var(--bg); width:240px; transition:var(--transition);"
              onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px rgba(29,107,243,0.1)'; this.style.background='#fff';"
              onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--bg)';"
            >
          </div>
        </div>

      </div>

      <!-- Table -->
      <table>
        <thead>
          <tr>
            <th style="width:32%;">Complaint</th>
            <th>Student</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="admin-complaints-tbody">
          <!-- Dynamically populated by app.js -->
        </tbody>
      </table>

    </div>
    <!-- end table container -->

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
